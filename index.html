<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    
    <title>Treino Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0a0a0a; color: white; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        .app-container { padding-bottom: 80px; }
        .exercise-card { background: #171717; border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
        .gif-container { width: 100%; height: 180px; background: #262626; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gif-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(23, 23, 23, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 12px 0 24px 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #737373; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .nav-item.active { color: #22c55e; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="setupScreen" class="min-h-screen flex flex-col p-6 items-center justify-center bg-black">
        <div class="w-full max-w-sm">
            <h1 class="text-3xl font-black mb-2 text-center text-white">Criar <span class="text-green-500">Perfil</span></h1>
            <p class="text-gray-400 text-center mb-8 text-sm">A IA montará uma periodização única para você.</p>
            
            <div class="space-y-4">
                <input type="number" id="peso" placeholder="Seu Peso (kg)" class="w-full p-4 rounded-xl bg-[#171717] text-white border border-[#333] focus:border-green-500 outline-none">
                <select id="nivel" class="w-full p-4 rounded-xl bg-[#171717] text-white border border-[#333] focus:border-green-500 outline-none">
                    <option value="" disabled selected>Nível de Experiência</option>
                    <option value="iniciante">Iniciante (1 a 6 meses)</option>
                    <option value="intermediario">Intermediário (6m a 2 anos)</option>
                    <option value="avancado">Avançado (+2 anos)</option>
                </select>
                <select id="objetivo" class="w-full p-4 rounded-xl bg-[#171717] text-white border border-[#333] focus:border-green-500 outline-none">
                    <option value="" disabled selected>Objetivo Principal</option>
                    <option value="hipertrofia">Ganho de Massa</option>
                    <option value="emagrecimento">Emagrecimento</option>
                </select>

                <button onclick="gerarPlano()" class="w-full p-4 rounded-xl bg-green-500 text-black font-black uppercase mt-4">
                    Gerar Meu Treino
                </button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden app-container">
        <header class="p-6 pt-12 bg-[#171717] border-b border-[#333]">
            <h2 id="appHeaderTitle" class="text-2xl font-black text-white">Treino de Hoje</h2>
            <p id="appHeaderSub" class="text-green-500 font-bold text-sm"></p>
        </header>

        <div class="p-4">
            <div id="tabHoje" class="space-y-4"></div>
            <div id="tabSemana" class="hidden space-y-6">
                <p class="text-gray-400 text-sm mb-4">Sua periodização exclusiva de treinos.</p>
                <div id="listaSemana"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="btnNavHoje" onclick="trocarAba('hoje')">
                <span class="nav-icon">💪</span>
                <span>Hoje</span>
            </div>
            <div class="nav-item" id="btnNavSemana" onclick="trocarAba('semana')">
                <span class="nav-icon">📅</span>
                <span>Meu Plano</span>
            </div>
            <div class="nav-item" onclick="resetarApp()">
                <span class="nav-icon">⚙️</span>
                <span>Refazer</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
