<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TreinoPRO | Smart & Gaviões Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
        .btn-gradient { background: linear-gradient(90deg, #22c55e, #3b82f6); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-green-500">

    <div id="setupScreen" class="min-h-screen flex flex-col p-6 items-center justify-center">
        <div class="w-full max-w-sm">
            <h1 class="text-3xl font-black mb-2 text-center uppercase italic">Bio<span class="text-green-500">Check</span></h1>
            <p class="text-gray-400 text-center mb-8 text-sm italic">Otimizado para máquinas Smart Fit e Gaviões</p>
            
            <div class="space-y-4">
                <input type="number" id="peso" placeholder="Peso (kg)" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-800 focus:border-green-500 outline-none">
                <input type="number" id="altura" placeholder="Altura (cm)" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-800 focus:border-green-500 outline-none">
                
                <select id="objetivo" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-800 focus:border-green-500 outline-none">
                    <option value="hipertrofia">Ganho de Massa (Hipertrofia)</option>
                    <option value="definicao">Definição / Emagrecimento</option>
                    <option value="forca">Força Bruta</option>
                </select>

                <button onclick="gerarTreino()" class="w-full p-4 rounded-xl btn-gradient font-black uppercase text-black hover:scale-105 transition-transform">
                    Montar Protocolo Especialista
                </button>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden min-h-screen pb-10">
        <header class="p-6 sticky top-0 glass z-50 border-b border-gray-800">
            <div class="flex justify-between items-start">
                <div>
                    <h2 id="diaTexto" class="text-2xl font-black uppercase italic">Segunda-Feira</h2>
                    <p id="divisaoNome" class="text-green-500 font-bold text-xs">PULL DAY (COSTAS E BÍCEPS)</p>
                </div>
                <button onclick="voltarParaSetup()" class="text-[10px] bg-gray-800 px-3 py-1 rounded-full uppercase border border-gray-700">Novo Treino</button>
            </div>
        </header>

        <div class="p-6">
            <div class="mb-8 p-4 rounded-2xl bg-blue-900/30 border border-blue-500/50">
                <h4 class="text-blue-400 font-bold text-xs uppercase mb-1">✓ Validação Técnica</h4>
                <p id="validacaoTexto" class="text-xs text-blue-100 leading-relaxed"></p>
            </div>

            <div id="listaExercicios" class="space-y-6">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
